<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule</title>

<style>
body { font-family:-apple-system; margin:0; background:#f7f7f7; }

/* 닉네임 입력 */
#nameBox {
  position:fixed;
  top:0; left:0; right:0; bottom:0;
  background:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:999;
}

input {
  padding:12px;
  margin:10px;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:16px;
}

button {
  margin-top:10px;
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:#333;
  color:white;
}

/* 헤더 */
header { padding:15px; text-align:center; }
#title { font-size:20px; font-weight:bold; }

/* 달력 */
.calendar {
  display:grid;
  grid-template-columns: repeat(7,1fr);
  gap:6px;
  padding:10px;
}

.day {
  background:white;
  border-radius:12px;
  padding:6px;
  min-height:80px;
  font-size:11px;
}

/* 색상 */
.pink {background:#ffd6e7;}
.mint {background:#d6fff5;}
.lavender {background:#e6dcff;}
.off {background:#f3e5d8;}
.vacation {background:#dfffdc;}

.popup {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:white;
  padding:15px;
  border-radius:20px 20px 0 0;
}
</style>
</head>

<body>

<div id="nameBox">
  <h2>닉네임 입력</h2>
  <input id="nickname" placeholder="이름 입력"/>
  <button id="startBtn" type="button">시작하기</button>
</div>

<header>
  <div id="title"></div>
</header>

<div class="calendar" id="calendar"></div>
<div id="popup" class="popup" style="display:none;"></div>

<script>
window.onload = function(){

/* ===== 닉네임 ===== */
let currentUser = "";

try {
  currentUser = localStorage.getItem("user") || "";
} catch(e){}

const nameBox = document.getElementById("nameBox");
const startBtn = document.getElementById("startBtn");
const nicknameInput = document.getElementById("nickname");

if(currentUser){
  nameBox.style.display="none";
}

/* 버튼 클릭 */
startBtn.onclick = startApp;

/* 엔터 */
nicknameInput.onkeydown = function(e){
  if(e.key === "Enter"){
    startApp();
  }
};

function startApp(){
  const name = nicknameInput.value.trim();

  if(!name){
    alert("이름 입력해줘");
    return;
  }

  currentUser = name;

  try {
    localStorage.setItem("user", name);
  } catch(e){}

  nameBox.style.display="none";
}

/* ===== 피리어드 ===== */
const baseDate = new Date('2026-05-11');

function getPeriodInfo(date){
  const diff = date - baseDate;
  const days = diff/(1000*60*60*24);
  const p = 10 + Math.floor(days/28);
  return `${date.getFullYear()}.${p}P`;
}

/* ===== 데이터 ===== */
let scheduleData = {};

try {
  scheduleData = JSON.parse(localStorage.getItem("scheduleData") || "{}");
} catch(e){
  scheduleData = {};
}

/* ===== UI ===== */
const calendar = document.getElementById("calendar");
const popup = document.getElementById("popup");

function renderHeader(){
  document.getElementById("title").innerText = getPeriodInfo(new Date());
}

function renderCalendar(){
  calendar.innerHTML="";

  for(let i=1;i<=31;i++){
    const key = `2026-05-${String(i).padStart(2,"0")}`;
    const dayData = scheduleData[key] || {};

    const div = document.createElement("div");
    div.className="day";
    div.innerHTML=`<b>${i}</b>`;

    Object.keys(dayData).forEach(user=>{
      const d = dayData[user];
      const row = document.createElement("div");

      if(d.time==="13:00") row.classList.add("pink");
      if(d.time==="14:00") row.classList.add("lavender");
      if(d.time==="15:00") row.classList.add("mint");
      if(d.time==="휴무") row.classList.add("off");
      if(d.time==="연차") row.classList.add("vacation");

      row.innerText = `${user} ${d.time||""}${d.memo ? " ("+d.memo+")":""}`;
      div.appendChild(row);
    });

    let pressTimer;
    let isLongPress = false;

    div.ontouchstart = function(){
      isLongPress = false;
      pressTimer = setTimeout(()=>{
        isLongPress = true;
        openWork(i);
      }, 500);
    };

    div.ontouchend = function(){
      clearTimeout(pressTimer);
      if(!isLongPress){
        openMemo(i);
      }
    };

    calendar.appendChild(div);
  }
}

/* ===== 근무 ===== */
function openWork(day){
  popup.style.display="block";
  popup.innerHTML="<h3>근무 선택</h3>";

  const options=[
    "06:00","07:00","08:00","09:00",
    "10:00","11:00","12:00","13:00","14:00","15:00",
    "휴무","연차"
  ];

  options.forEach(opt=>{
    const btn=document.createElement("button");
    btn.innerText=opt;

    btn.onclick=function(){
      save(day,{time:opt});
      popup.style.display="none";
    };

    popup.appendChild(btn);
  });
}

/* ===== 메모 ===== */
function openMemo(day){
  const memo = prompt("메모 입력");
  if(memo !== null){
    save(day,{memo});
  }
}

/* ===== 저장 ===== */
function save(day,obj){
  const key=`2026-05-${String(day).padStart(2,"0")}`;

  if(!scheduleData[key]) scheduleData[key]={};
  if(!scheduleData[key][currentUser]) scheduleData[key][currentUser]={};

  Object.assign(scheduleData[key][currentUser], obj);

  try {
    localStorage.setItem("scheduleData", JSON.stringify(scheduleData));
  } catch(e){}

  renderCalendar();
}

/* 실행 */
renderHeader();
renderCalendar();

};
</script>

</body>

      if(d.time==="15:00") row.classList.add("mint");
      if(d.time==="휴무") row.classList.add("off");
      if(d.time==="연차") row.classList.add("vacation");

      row.innerText = `${user} ${d.time||""}`;

      if(d.memo){
        row.innerText += ` (${d.memo})`;
      }

      div.appendChild(row);
    });

    let timer;

    div.onmousedown = ()=>{
      timer=setTimeout(()=>openWorkPopup(i),500);
    };

    div.onmouseup = ()=>{
      clearTimeout(timer);
      openMemo(i);
    };

    calendar.appendChild(div);
  }
}

/* 근무 선택 */
function openWorkPopup(day){
  popup.style.display="block";
  popup.innerHTML="<h3>근무 선택</h3>";

  const options=[
    "06:00","07:00","08:00","09:00",
    "10:00","11:00","12:00","13:00","14:00","15:00",
    "휴무","연차"
  ];

  options.forEach(opt=>{
    const btn=document.createElement("button");
    btn.innerText=opt;

    btn.onclick=()=>{
      save(day,{time:opt});
      popup.style.display="none";
    };

    popup.appendChild(btn);
  });
}

/* 메모 */
function openMemo(day){
  const memo=prompt("메모 입력");
  if(memo!==null){
    save(day,{memo});
  }
}

/* 저장 */
function save(day,obj){
  const key=`2026-05-${String(day).padStart(2,"0")}`;

  const prev = (scheduleData[key] && scheduleData[key][currentUser]) || {};
  const newData = {...prev,...obj};

  set(ref(db,`schedule/${key}/${currentUser}`),newData);
}

/* 실시간 */
onValue(ref(db,"schedule"), snap=>{
  scheduleData = snap.val() || {};
  renderCalendar();
});

onValue(ref(db,"notice"), snap=>{
  noticeText = snap.val() || noticeText;
  renderHeader();
});

renderHeader();

</script>
